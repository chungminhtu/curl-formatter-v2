<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cURL Formatter</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Google Sans Code';
      src: local('Google Sans Mono'), local('GoogleSansMono-Regular'), local('Google Sans Code');
      font-weight: 400;
      font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #f8f9fb;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-input: #f4f5f7;
      --bg-hover: #eef0f4;
      --border: #e2e5ea;
      --border-focus: #6366f1;
      --text-primary: #1a1d23;
      --text-secondary: #4b5563;
      --text-muted: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-subtle: rgba(99, 102, 241, 0.08);
      --success: #16a34a;
      --warning: #ca8a04;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --font-ui: 'Lexend Deca', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'Google Sans Code', 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
      font-family: var(--font-mono);
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      font-size: 12px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-subtle);
      color: var(--accent-hover);
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px 24px;
      gap: 16px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .detected-badge {
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--accent-subtle);
      color: var(--accent-hover);
      border: 1px solid rgba(99, 102, 241, 0.15);
      margin-left: auto;
      display: none;
    }

    .detected-badge.visible {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .detected-badge svg {
      width: 12px;
      height: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      font-family: var(--font-ui);
      letter-spacing: 0.01em;
    }

    .btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .btn-success {
      background: var(--success);
      color: #fff;
    }
    .btn-success:hover {
      background: #16a34a;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-outline:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--text-muted);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .panels {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      min-height: 0;
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .panel-title svg {
      width: 13px;
      height: 13px;
      opacity: 0.5;
    }

    .char-count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      font-family: var(--font-mono);
    }

    .panel-body {
      flex: 1;
      display: flex;
      position: relative;
    }

    textarea {
      flex: 1;
      width: 100%;
      background: #ffffff;
      color: var(--text-primary);
      border: none;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.75;
      resize: none;
      outline: none;
      tab-size: 2;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    textarea::placeholder {
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .output-area {
      flex: 1;
      width: 100%;
      background: var(--bg-input);
      color: var(--text-primary);
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.75;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 200px;
    }

    .output-placeholder {
      color: var(--text-muted);
      font-style: italic;
      user-select: none;
      font-family: var(--font-ui);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 100;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      border-color: rgba(22, 163, 74, 0.3);
      background: linear-gradient(135deg, #fff, rgba(22, 163, 74, 0.06));
    }

    .toast.warning {
      border-color: rgba(202, 138, 4, 0.3);
      background: linear-gradient(135deg, #fff, rgba(202, 138, 4, 0.06));
    }

    .toast-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .footer {
      padding: 10px 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      letter-spacing: 0.02em;
    }

    .footer kbd {
      display: inline-block;
      padding: 1px 5px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .header { padding: 0 16px; }
      .badge { display: none; }
      .main { padding: 16px; gap: 12px; }
      .panels { grid-template-columns: 1fr; }
      .output-area, textarea { min-height: 180px; }
      .toolbar { gap: 6px; }
      .btn { flex: 1; justify-content: center; padding: 10px 14px; }
      .footer { padding: 10px 16px; }
    }

    @media (max-width: 480px) {
      .header h1 { font-size: 14px; }
      .btn { font-size: 13px; padding: 9px 10px; }
      .btn span.btn-label { display: none; }
    }

    @media (min-width: 769px) {
      .panels { min-height: 500px; }
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    textarea:focus {
      box-shadow: inset 0 0 0 1px var(--border-focus);
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="logo">&lt;/&gt;</div>
      <h1>cURL Formatter</h1>
    </div>
    <div class="header-right">
      <span class="badge">v3.0</span>
    </div>
  </header>

  <main class="main">
    <div class="toolbar">
      <button class="btn btn-primary" onclick="processAndCopy()" title="Process and copy (Ctrl+Enter)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        <span class="btn-label">Process & Copy</span>
      </button>
      <button class="btn btn-success" onclick="copyResult()" title="Copy result">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span class="btn-label">Copy Result</span>
      </button>
      <button class="btn btn-outline" onclick="clearAll()" title="Clear">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        <span class="btn-label">Clear</span>
      </button>
      <span class="detected-badge" id="detectedBadge">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="detectedLabel"></span>
      </span>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Input
          </span>
          <span class="char-count" id="inputCount">0 chars</span>
        </div>
        <div class="panel-body">
          <textarea id="input" placeholder='Paste anything — auto-detects and formats&#10;&#10;Supports:&#10;&#10;1. Escaped curl with \n&#10;   curl -X POST \n  &quot;https://api.example.com&quot; \n  -H &quot;Content-Type: application/json&quot; \n  -d &apos;{&quot;key&quot;:&quot;val&quot;}&apos;&#10;&#10;2. JSON-wrapped curl (from code/config)&#10;   &quot;curl&quot;: &quot;curl -X POST \\n  \&quot;https://api.example.com\&quot; \\n  -d &apos;{\&quot;key\&quot;:\&quot;val\&quot;}&apos;&quot;,&#10;&#10;3. curl with $&apos;...&apos; body&#10;   curl -X POST --data $&apos;{&quot;key&quot;:&quot;value&quot;}&apos; https://api.example.com&#10;&#10;4. curl with line continuations&#10;   curl -X POST \&#10;     https://api.example.com \&#10;     -H &quot;Content-Type: application/json&quot; \&#10;     -d &apos;{&quot;key&quot;:&quot;val&quot;}&apos;&#10;&#10;5. Raw HTTP request&#10;   POST https://api.example.com&#10;   {&quot;key&quot;:&quot;value&quot;}&#10;&#10;6. Plain escaped text&#10;   He said \&quot;hello\&quot; and path C:\\Users\\name' spellcheck="false"></textarea>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Output
          </span>
          <span class="char-count" id="outputCount">0 chars</span>
        </div>
        <div class="panel-body">
          <div class="output-area" id="output"><span class="output-placeholder">Result will appear here...</span></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to process
  </footer>

  <div class="toast" id="toast">
    <svg class="toast-icon" id="toastIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span id="toastMsg"></span>
  </div>

  <script>
    // ── Char count ──
    const inputEl = document.getElementById('input');
    const inputCount = document.getElementById('inputCount');
    inputEl.addEventListener('input', () => {
      const len = inputEl.value.length;
      inputCount.textContent = len.toLocaleString() + ' char' + (len !== 1 ? 's' : '');
    });

    function setOutputCount(text) {
      const len = text.length;
      document.getElementById('outputCount').textContent = len.toLocaleString() + ' char' + (len !== 1 ? 's' : '');
    }

    function showDetected(label) {
      const badge = document.getElementById('detectedBadge');
      document.getElementById('detectedLabel').textContent = label;
      badge.classList.add('visible');
    }

    function hideDetected() {
      document.getElementById('detectedBadge').classList.remove('visible');
    }

    // ══════════════════════════════════════
    // ── Smart process: auto-detect input ──
    // ══════════════════════════════════════
    function processAndCopy() {
      const raw = inputEl.value;
      if (!raw.trim()) { showToast('Nothing to process', 'warning'); return; }

      let result;
      let label;

      // Step 1: Unwrap JSON wrappers first
      let unwrapped = unwrapJSON(raw);

      // Step 2: Detect what the unwrapped content is
      if (isCurl(unwrapped)) {
        result = formatCurl(unwrapped);
        label = 'cURL formatted';
      } else if (isHTTPRequest(unwrapped)) {
        result = httpToCurl(unwrapped);
        label = 'HTTP → cURL';
      } else {
        // Plain unescape
        result = unescape(raw);
        // Check if after unescape it's curl
        if (isCurl(result)) {
          result = formatCurl(result);
          label = 'cURL formatted';
        } else if (isHTTPRequest(result)) {
          result = httpToCurl(result);
          label = 'HTTP → cURL';
        } else {
          label = 'Unescaped';
        }
      }

      document.getElementById('output').textContent = result;
      setOutputCount(result);
      showDetected(label);
      navigator.clipboard.writeText(result).then(() => {
        showToast('Processed and copied', 'success');
      }).catch(() => {
        showToast('Processed — clipboard denied', 'warning');
      });
    }

    // ── Detect helpers ──
    function isCurl(text) {
      return /^\s*curl\s/i.test(text.trim());
    }

    function isHTTPRequest(text) {
      return /^(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS)\s+https?:\/\//i.test(text.trim());
    }

    // ── Unwrap JSON string wrappers ──
    function unwrapJSON(text) {
      let trimmed = text.trim();

      // "key": "value",
      if (/^"[^"]*"\s*:\s*"/.test(trimmed)) {
        try {
          const obj = JSON.parse('{' + trimmed.replace(/,\s*$/, '') + '}');
          return obj[Object.keys(obj)[0]];
        } catch (e) {}
      }
      // "value",
      if (/^"/.test(trimmed) && /"\s*,?\s*$/.test(trimmed) && (trimmed.includes('\\n') || trimmed.includes('\\"') || trimmed.includes('\\\\'))) {
        try {
          return JSON.parse(trimmed.replace(/,\s*$/, ''));
        } catch (e) {}
      }
      return text;
    }

    // ── Plain unescape ──
    function unescape(text) {
      // Try JSON unwrap first
      let result = unwrapJSON(text);
      if (result !== text) return result;

      // Manual unescape: loop until stable
      let prev;
      do {
        prev = result;
        result = result.replace(/\\(\\|"|n|t|r|'|\/)/g, function(_, ch) {
          switch (ch) {
            case '\\': return '\\';
            case '"': return '"';
            case 'n': return '\n';
            case 't': return '\t';
            case 'r': return '\r';
            case "'": return "'";
            case '/': return '/';
            default: return '\\' + ch;
          }
        });
      } while (result !== prev);

      return result;
    }

    // ── Shell quoting helper ──
    function shellQuote(str) {
      if (!str.includes("'")) return "'" + str + "'";
      return "'" + str.replace(/'/g, "'\\''") + "'";
    }

    // ── HTTP request → curl ──
    function httpToCurl(text) {
      const match = text.trim().match(/^(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS)\s+(https?:\/\/\S+)\s*\n?([\s\S]*)$/i);
      if (!match) return text;

      const method = match[1].toUpperCase();
      const url = match[2].trim();
      const body = match[3].trim();

      let parts = [];
      parts.push("curl --location --request " + method + " " + shellQuote(url));

      if (body) {
        let pretty = body;
        try { pretty = JSON.stringify(JSON.parse(body), null, 4); } catch (e) {}
        parts.push("--header " + shellQuote("Content-Type: application/json"));
        parts.push("--data " + shellQuote(pretty));
      }

      return parts.join(' \\\n');
    }

    // ── Format curl ──
    function formatCurl(raw) {
      // Normalize: join line continuations, replace real newlines, collapse spaces
      // Note: do NOT replace literal \n (backslash+n) — it's a JSON escape sequence
      let cmd = raw.replace(/\\\r?\n\s*/g, ' ').replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim();

      if (!cmd.toLowerCase().startsWith('curl')) return raw;
      cmd = cmd.substring(4).trim();

      let method = null;
      let url = null;
      let headers = [];
      let dataStr = null;
      let extraFlags = [];

      const tokens = tokenize(cmd);

      for (let i = 0; i < tokens.length; i++) {
        const t = tokens[i];
        if (t === '-X' || t === '--request') {
          method = tokens[++i];
        } else if (t === '-H' || t === '--header') {
          headers.push(tokens[++i]);
        } else if (t === '-d' || t === '--data' || t === '--data-raw' || t === '--data-binary') {
          dataStr = tokens[++i];
        } else if (t === '--location' || t === '-L') {
          // skip
        } else if (t === '--compressed' || t === '-s' || t === '--silent' || t === '-k' || t === '--insecure') {
          extraFlags.push(t);
        } else if (!t.startsWith('-')) {
          url = t;
        } else {
          if (i + 1 < tokens.length && !tokens[i + 1].startsWith('-')) {
            extraFlags.push(t + ' ' + tokens[++i]);
          } else {
            extraFlags.push(t);
          }
        }
      }

      if (!url) return raw;

      // Clean up escaped characters in data body (handles JSON-escaped input)
      if (dataStr) {
        let cleaned = dataStr.replace(/\\\\/g, '\\').replace(/\\"/g, '"').replace(/\\'/g, "'");
        try { JSON.parse(cleaned); dataStr = cleaned; } catch (e) {}
      }

      // Pretty-print JSON data
      let prettyData = dataStr;
      if (dataStr) {
        try { prettyData = JSON.stringify(JSON.parse(dataStr), null, 4); } catch (e) {}
      }

      // Auto-add Content-Type for JSON
      let hasContentType = headers.some(h => h.toLowerCase().includes('content-type'));
      if (dataStr && !hasContentType) {
        try { JSON.parse(dataStr); headers.unshift('Content-Type: application/json'); } catch (e) {}
      }

      if (!method && dataStr) method = 'POST';

      let parts = [];
      if (method && method !== 'GET') {
        parts.push("curl --location --request " + method + " " + shellQuote(url));
      } else {
        parts.push("curl --location " + shellQuote(url));
      }

      for (const h of headers) parts.push("--header " + shellQuote(h));
      for (const f of extraFlags) parts.push(f);
      if (prettyData) parts.push("--data " + shellQuote(prettyData));

      return parts.join(' \\\n');
    }

    // ── Tokenizer ──
    function tokenize(str) {
      const tokens = [];
      let i = 0;
      while (i < str.length) {
        while (i < str.length && str[i] === ' ') i++;
        if (i >= str.length) break;

        // $'...' (ANSI-C quoting)
        if (str[i] === '$' && i + 1 < str.length && str[i + 1] === "'") {
          i += 2;
          let token = '';
          while (i < str.length && str[i] !== "'") {
            if (str[i] === '\\' && i + 1 < str.length) {
              const next = str[i + 1];
              if (next === "'") { token += "'"; i += 2; }
              else if (next === '\\') { token += '\\'; i += 2; }
              else if (next === 'n') { token += '\n'; i += 2; }
              else if (next === 't') { token += '\t'; i += 2; }
              else { token += str[i]; i++; }
            } else { token += str[i]; i++; }
          }
          i++;
          tokens.push(token);
        }
        // Backslash-escaped double-quoted: \"...\" (from JSON-escaped context)
        else if (str[i] === '\\' && i + 1 < str.length && str[i + 1] === '"') {
          i += 2;
          let token = '';
          while (i < str.length) {
            if (str[i] === '\\' && i + 1 < str.length && str[i + 1] === '"') { i += 2; break; }
            if (str[i] === '\\' && i + 1 < str.length && str[i + 1] === '\\') { token += '\\'; i += 2; }
            else { token += str[i]; i++; }
          }
          tokens.push(token);
        }
        // Single-quoted (with smart apostrophe handling)
        else if (str[i] === "'") {
          i++;
          let token = '';
          let depth = 0; // tracks {} and [] nesting
          while (i < str.length) {
            if (str[i] === "'") {
              // Close only if brace/bracket depth is 0 AND next char is not alphanumeric
              if (depth === 0 && (i + 1 >= str.length || !/[a-zA-Z0-9]/.test(str[i + 1]))) {
                i++;
                break;
              }
              // Otherwise treat as apostrophe inside content
              token += str[i];
              i++;
            } else {
              if (str[i] === '{' || str[i] === '[') depth++;
              else if ((str[i] === '}' || str[i] === ']') && depth > 0) depth--;
              token += str[i];
              i++;
            }
          }
          tokens.push(token);
        }
        // Double-quoted
        else if (str[i] === '"') {
          i++;
          let token = '';
          while (i < str.length && str[i] !== '"') {
            if (str[i] === '\\' && i + 1 < str.length) { token += str[i + 1]; i += 2; }
            else { token += str[i]; i++; }
          }
          i++;
          tokens.push(token);
        }
        // Unquoted
        else {
          let token = '';
          while (i < str.length && str[i] !== ' ') { token += str[i]; i++; }
          tokens.push(token);
        }
      }
      return tokens;
    }

    // ── Actions ──
    function copyResult() {
      const el = document.getElementById('output');
      if (el.querySelector('.output-placeholder')) { showToast('Nothing to copy', 'warning'); return; }
      navigator.clipboard.writeText(el.textContent).then(() => {
        showToast('Copied to clipboard', 'success');
      }).catch(() => { showToast('Clipboard denied', 'warning'); });
    }

    function clearAll() {
      inputEl.value = '';
      document.getElementById('output').innerHTML = '<span class="output-placeholder">Result will appear here...</span>';
      document.getElementById('inputCount').textContent = '0 chars';
      document.getElementById('outputCount').textContent = '0 chars';
      hideDetected();
      inputEl.focus();
      showToast('Cleared', 'success');
    }

    // ── Keyboard shortcut ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        processAndCopy();
      }
    });

    // ── Toast ──
    let toastTimer;
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      const toastIcon = document.getElementById('toastIcon');
      toastMsg.textContent = msg;
      toast.className = 'toast ' + type;
      if (type === 'success') {
        toastIcon.innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
        toastIcon.style.color = 'var(--success)';
      } else {
        toastIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
        toastIcon.style.color = 'var(--warning)';
      }
      clearTimeout(toastTimer);
      requestAnimationFrame(() => toast.classList.add('visible'));
      toastTimer = setTimeout(() => toast.classList.remove('visible'), 2500);
    }

    inputEl.focus();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW reg failed:', e));
      });
    }
  </script>
</body>
